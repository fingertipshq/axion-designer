name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  quality:
    name: quality (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run regression suite
        run: npm test
      - name: Run P0 checks
        run: npm run test:p0
      - name: Run P3 governance, Studio, and drift checks
        run: npm run test:p3
      - name: Verify approved direction and decision-chain integrity
        run: |
          node bin/dk.mjs design check
          node bin/dk.mjs design history --json >/dev/null
      - name: Verify repository core and installed heavy gates
        run: |
          node bin/dk.mjs verify
          node bin/dk.mjs verify --gate css-strict --require-gates
          node bin/dk.mjs verify --gate a11y --require-gates
      - name: Validate package contents
        run: |
          npm run check:package
          npm pack --dry-run

  release:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.12.1
      - name: Install locked dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Verify public release identity
        run: npm run check:release-identity

      - name: Pack and smoke-test artifact
        run: |
          TARBALL="$(npm pack --silent)"
          TMPDIR="$(mktemp -d)"
          npm install --prefix "$TMPDIR" "$GITHUB_WORKSPACE/$TARBALL"
          node "$TMPDIR/node_modules/axion-designer/bin/dk.mjs" --help >/dev/null
          (
            cd "$TMPDIR"
            node --input-type=module -e "import('axion-designer').then(m => { if (typeof m.defineConfig !== 'function') process.exit(1) })"
            node "$TMPDIR/node_modules/axion-designer/bin/dk.mjs" new smoke
            test -f smoke/.gitignore
            grep -qx 'playwright-report/' smoke/.gitignore
            cd smoke
            node "$TMPDIR/node_modules/axion-designer/bin/dk.mjs" verify --no-cache
          )

      - name: Publish with provenance
        run: npm publish --provenance --access public
