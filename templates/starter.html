<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starter — Axion Designer</title>
  <!-- 唯一真相產物：所有顏色/間距/字級都來自這裡 -->
  <link rel="stylesheet" href="../styles/tokens.css">
  <style>
    /* 這個範本示範「只用 token、不寫死值」。它會通過全部關卡（anti-slop / stylelint / a11y / visual）。 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family-base);
      color: var(--color-text-primary);
      background: var(--color-surface-page);
      line-height: var(--font-leading-normal);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--color-brand-accent); outline-offset: 3px; border-radius: var(--radius-sm); }
    .wrap { max-width: 960px; margin: 0 auto; padding: 0 var(--space-6); }

    nav { border-bottom: 1px solid var(--color-border-subtle); }
    .nav-in { display: flex; align-items: center; justify-content: space-between; height: 56px; max-width: 960px; margin: 0 auto; padding: 0 var(--space-6); }
    .brand { font-weight: var(--font-weight-semibold); letter-spacing: var(--font-tracking-tight); }
    .cta { background: var(--color-brand-accent); color: var(--color-text-on-accent); padding: var(--space-2) var(--space-4); border-radius: var(--radius-pill); font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); }

    .hero { text-align: center; padding: var(--space-20) var(--space-6) var(--space-12); }
    .hero h1 { font-size: var(--font-size-3xl); letter-spacing: var(--font-tracking-tight); line-height: var(--font-leading-tight); font-weight: var(--font-weight-semibold); max-width: 18ch; margin: 0 auto var(--space-5); }
    .hero p { font-size: var(--font-size-lg); color: var(--color-text-secondary); max-width: 44ch; margin: 0 auto var(--space-8); }
    .actions { display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap; }
    .btn { padding: var(--space-3) var(--space-6); border-radius: var(--radius-pill); font-weight: var(--font-weight-medium); }
    .btn-primary { background: var(--color-brand-accent); color: var(--color-text-on-accent); }
    .btn-secondary { border: 1px solid var(--color-border-default); color: var(--color-text-primary); }

    /* 真實產品畫面（不是抽象 icon）：一張清單卡 */
    .card { max-width: 460px; margin: var(--space-12) auto 0; background: var(--color-surface-raised); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-xl); box-shadow: var(--shadow-card); text-align: left; overflow: hidden; }
    .card-h { padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-border-subtle); font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); color: var(--color-text-secondary); }
    .row { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-4); padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-border-subtle); }
    .row:last-child { border-bottom: none; }
    .row .k { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); }
    .row .v { font-size: var(--font-size-sm); font-variant-numeric: tabular-nums; color: var(--color-text-secondary); }
    .row .v.pos { color: var(--color-state-positive); font-weight: var(--font-weight-semibold); }

    /* footer 是有意義的內文（15px 常規字）→ 用 text-secondary 達 WCAG AA；text-muted 是 3:1 三級色，只適合大字/裝飾。 */
    footer { border-top: 1px solid var(--color-border-subtle); margin-top: var(--space-20); padding: var(--space-10) var(--space-6); color: var(--color-text-secondary); font-size: var(--font-size-sm); }
    .foot-in { max-width: 960px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: var(--space-3); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-in">
      <a class="brand" href="#top">Axion Designer</a>
      <a class="cta" href="#start">開始使用</a>
    </div>
  </nav>

  <main id="top">
    <section class="hero">
      <h1>一份 token，一頁全站一致</h1>
      <p>改一個顏色只改 tokens.json，編譯成 CSS 變數、由 CI 把關。這頁只用 token、不寫死任何值——所以它通過全部驗收關卡。</p>
      <div class="actions">
        <a class="btn btn-primary" href="#start">建立你的設計系統</a>
        <a class="btn btn-secondary" href="#rules">看驗收規則</a>
      </div>

      <section class="card" aria-label="關卡通過狀態範例">
        <h2 class="card-h">verify — 關卡狀態</h2>
        <div class="row"><span class="k">token 契約（結構 · 對比 AA）</span><span class="v pos">通過</span></div>
        <div class="row"><span class="k">tokens.css 與 SSOT 同步</span><span class="v pos">通過</span></div>
        <div class="row"><span class="k">反 AI-slop 掃描</span><span class="v pos">通過</span></div>
        <div class="row"><span class="k">無障礙（axe / WCAG AA）</span><span class="v pos">通過</span></div>
      </section>
    </section>
  </main>

  <footer>
    <div class="foot-in">
      <span id="start">Axion Designer — 通用設計系統工作流</span>
      <span id="rules">規則見 docs/rules.md</span>
    </div>
  </footer>
</body>
</html>
